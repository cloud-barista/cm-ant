services:
  cm-ant:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: cm-ant
    platform: linux/amd64
    ports:
        - 8880:8880
    networks:
      - cm-ant-net
      - cb-tumblebug-net
    depends_on:
      cb-tumblebug:
        condition: service_started
      ant-postgres:
        condition: service_healthy
    volumes:
      - ./container-volume/cm-ant/result/:/app/result/
    environment:
      - ANT_SPIDER_HOST=http://cb-spider
      - ANT_SPIDER_PORT=1024
      - ANT_SPIDER_USERNAME=${SPIDER_USERNAME:?Please set SPIDER_USERNAME}
      - ANT_SPIDER_PASSWORD=${SPIDER_PASSWORD:?Please set SPIDER_PASSWORD}
      - ANT_TUMBLEBUG_HOST=http://cb-tumblebug
      - ANT_TUMBLEBUG_PORT=1323
      - ANT_TUMBLEBUG_USERNAME=${TB_API_USERNAME:?Please set TB_API_USERNAME}
      - ANT_TUMBLEBUG_PASSWORD=${TB_API_PASSWORD:?Please set TB_API_PASSWORD}
      - ANT_DATABASE_HOST=ant-postgres
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8880/ant/readyz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ant-postgres:
    container_name: ant-postgres
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=cm-ant-user
      - POSTGRES_PASSWORD=cm-ant-secret
      - POSTGRES_DB=cm-ant-db
    networks:
      - cm-ant-net
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "cm-ant-user", "-d", "cm-ant-db" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  cb-tumblebug:
    image: cloudbaristaorg/cb-tumblebug:0.12.9
    container_name: cb-tumblebug
    pull_policy: always
    platform: linux/amd64
    ports:
      - 1323:1323
    depends_on:
      cb-tumblebug-etcd:
        condition: service_started
      cb-spider:
        condition: service_started
      cb-tumblebug-postgres:
        condition: service_healthy
      mc-terrarium:
        condition: service_healthy
    networks:
      - cm-ant-net
      - cb-tumblebug-net
      - cb-spider-net
    volumes:
      - ./container-volume/cb-tumblebug/meta_db/:/app/meta_db/
      - ./container-volume/cb-tumblebug/log/:/app/log/
    environment:
      # - TB_ROOT_PATH=/app
      - TB_SPIDER_REST_URL=http://cb-spider:1024/spider
      - TB_SPIDER_USERNAME=${SPIDER_USERNAME:?Please set SPIDER_USERNAME}
      - TB_SPIDER_PASSWORD=${SPIDER_PASSWORD:?Please set SPIDER_PASSWORD}
      - TB_ETCD_ENDPOINTS=http://cb-tumblebug-etcd:2379
      - TB_POSTGRES_ENDPOINT=cb-tumblebug-postgres:5432
      - TB_POSTGRES_DATABASE=tumblebug
      - TB_POSTGRES_USER=tumblebug
      - TB_POSTGRES_PASSWORD=tumblebug
      # cb-tumblebug 0.12.x 강제 인증 (cm-mayfly default-env와 정합 — 평문 default)
      - TB_AUTH_ENABLED=true
      - TB_API_USERNAME=${TB_API_USERNAME:?Please set TB_API_USERNAME}
      - TB_API_PASSWORD=${TB_API_PASSWORD:?Please set TB_API_PASSWORD}
      # mc-terrarium 연동 (cb-tumblebug 0.12.3+)
      - TB_TERRARIUM_REST_URL=http://mc-terrarium:8055/terrarium
      - TB_TERRARIUM_API_USERNAME=${TERRARIUM_API_USERNAME:?Please set TERRARIUM_API_USERNAME}
      - TB_TERRARIUM_API_PASSWORD=${TERRARIUM_API_PASSWORD:?Please set TERRARIUM_API_PASSWORD}
      # OpenBao 시크릿 백엔드 (dev mode, 비어 있으면 통합 비활성)
      - VAULT_ADDR=http://openbao:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      # - TB_ETCD_AUTH_ENABLED=false
      # - TB_ETCD_USERNAME=default
      # - TB_ETCD_PASSWORD=default
      # - TB_ALLOW_ORIGINS=*
      # - TB_AUTH_MODE=jwt
      # - TB_AUTOCONTROL_DURATION_MS=10000
      # - TB_SELF_ENDPOINT=localhost:1323
      # - TB_DRAGONFLY_REST_URL=http://cb-dragonfly:9090/dragonfly
      # - TB_DEFAULT_NAMESPACE=default
      # - TB_DEFAULT_CREDENTIALHOLDER=admin
      # - TB_LOGFILE_PATH=/app/log/tumblebug.log
      # - TB_LOGFILE_MAXSIZE=1000
      # - TB_LOGFILE_MAXBACKUPS=3
      # - TB_LOGFILE_MAXAGE=30
      # - TB_LOGFILE_COMPRESS=false
      # - TB_LOGLEVEL=debug
      # - TB_LOGWRITER=both
      # - TB_NODE_ENV=development
    healthcheck: # for CB-Tumblebug
      test: [ "CMD", "curl", "-f", "http://localhost:1323/tumblebug/readyz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # CB-Tumblebug PostgreSQL
  # This is used for storing CB-Tumblebug Spec and Image.
  cb-tumblebug-postgres:
    image: postgres:16-alpine
    container_name: cb-tumblebug-postgres
    restart: always
    networks:
      - cb-tumblebug-net
    ports:
      - 6432:5432
    volumes:
      - ./container-volume/cb-tumblebug/meta_db/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=tumblebug
      - POSTGRES_PASSWORD=tumblebug
      - POSTGRES_DB=tumblebug
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tumblebug"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cb-tumblebug-etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    container_name: cb-tumblebug-etcd
    networks:
      - cb-tumblebug-net
    ports:
      - 2379:2379
      - 2380:2380
    volumes: 
      - ./container-volume/cb-tumblebug/etcd/data:/etcd-data
    entrypoint: /usr/local/bin/etcd
    command:
      - --name
      - s1
      - --data-dir
      - /etcd-data
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://0.0.0.0:2380
      - --initial-cluster
      - s1=http://0.0.0.0:2380
      - --initial-cluster-token
      - tkn
      - --initial-cluster-state
      - new
      - --log-level
      - info
      - --logger
      - zap
      - --log-outputs
      - stderr
      - --auth-token
      - simple
    healthcheck:
      test: [  "CMD", "/usr/local/bin/etcd", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  cb-spider:
    image: cloudbaristaorg/cb-spider:0.12.17
    pull_policy: always
    container_name: cb-spider
    platform: linux/amd64
    networks:
      - cb-tumblebug-net
      - cb-spider-net
    ports:
      - 1024:1024
    volumes:
      - ./container-volume/cb-spider/meta_db/:/root/go/src/github.com/cloud-barista/cb-spider/meta_db/
      - ./container-volume/cb-spider/log/:/root/go/src/github.com/cloud-barista/cb-spider/log/
    environment:
      - PLUGIN_SW=OFF
      - SERVER_ADDRESS=0.0.0.0:1024
      # cb-spider 0.12.6+ 강제 인증 (비어 있으면 log.Fatal로 즉시 종료)
      - SPIDER_USERNAME=${SPIDER_USERNAME:?Please set SPIDER_USERNAME}
      - SPIDER_PASSWORD=${SPIDER_PASSWORD:?Please set SPIDER_PASSWORD}
      - SPIDER_LOG_LEVEL=error
      - SPIDER_HISCALL_LOG_LEVEL=error
      - ID_TRANSFORM_MODE=OFF
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:1024/spider/readyz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    
  # mc-terrarium — cb-tumblebug 0.12.3+ 통합 대상. cb-tumblebug가 depends_on healthy로 묶음
  mc-terrarium:
    image: cloudbaristaorg/mc-terrarium:0.1.4
    container_name: mc-terrarium
    pull_policy: always
    platform: linux/amd64
    networks:
      - cb-tumblebug-net
    environment:
      - TERRARIUM_API_USERNAME=${TERRARIUM_API_USERNAME:?Please set TERRARIUM_API_USERNAME}
      - TERRARIUM_API_PASSWORD=${TERRARIUM_API_PASSWORD:?Please set TERRARIUM_API_PASSWORD}
      - VAULT_ADDR=http://openbao:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-}
    depends_on:
      openbao:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8055/terrarium/readyz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # OpenBao — dev mode (in-memory, 자동 init/unseal). 운영 환경에선 별도 설정
  openbao:
    image: openbao/openbao:2.5.1
    container_name: openbao
    platform: linux/amd64
    cap_add: [ IPC_LOCK ]
    networks:
      - cb-tumblebug-net
    environment:
      - BAO_ADDR=http://0.0.0.0:8200
      - BAO_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN:-cmant-dev-token}
      - SKIP_SETCAP=true
    command: server -dev
    healthcheck:
      test: ["CMD", "sh", "-c", "rc=0; bao status || rc=$$?; [ $$rc -le 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

networks:
  cm-ant-net:
  cb-spider-net:
  cb-tumblebug-net: